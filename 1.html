<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warkop Senja</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>WARKOP SENJA</h1>
      <p>Nongkrong, ngopi, cerita sampai lupa waktu ☕</p>
    </div>
  </div>

  <div class="container">

    <h2>Menu Favorit</h2>

    <div class="menu">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>Kopi Hitam</h3>
          <p class="price">Rp 12.000</p>

          <button onclick="addToCart('Kopi Hitam',12000)">
            Tambah Pesanan
          </button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>Es Kopi Susu</h3>
          <p class="price">Rp 18.000</p>

          <button onclick="addToCart('Es Kopi Susu',18000)">
            Tambah Pesanan
          </button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>Cappuccino</h3>
          <p class="price">Rp 22.000</p>

          <button onclick="addToCart('Cappuccino',22000)">
            Tambah Pesanan
          </button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1484723091739-30a097e8f929?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>Roti Bakar</h3>
          <p class="price">Rp 15.000</p>

          <button onclick="addToCart('Roti Bakar',15000)">
            Tambah Pesanan
          </button>
        </div>
      </div>

    </div>

    <div class="cart">

      <h2>Keranjang</h2>

      <div id="cart-items"></div>

      <h3 class="total">
        Total: Rp <span id="total">0</span>
      </h3>

      <button class="pay-btn" onclick="payNow()">
        Bayar Sekarang
      </button>

      <div id="success" class="success">
        Pembayaran berhasil ✅ <br>
        Terima kasih sudah ngopi di Warkop Senja ☕
      </div>

    </div>

  </div>

  <footer>
    © 2026 Warkop Senja
  </footer>

  <script src="script.js"></script>
</body>
</html>
