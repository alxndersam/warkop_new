<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Warkop Senja</title>

  <link rel="stylesheet" href="style.css">

  <!-- FIREBASE -->
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- SCRIPT -->
  <script defer src="script.js"></script>

  <!-- FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- HERO -->
  <header class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>
        ☕ WARKOP SENJA ☕
      </h1>

      <p>
        Nongkrong, ngopi, cerita sampai lupa waktu.
      </p>

    </div>

  </header>

  <!-- MAIN -->
  <main>

    <!-- MENU -->
    <section class="section">

      <h2>
        Menu Favorit
      </h2>

      <div class="menu-grid">

        <!-- MENU 1 -->
        <div class="menu-card">

          <img src="images/es-kopi-susu.jpg">

          <h3>
            Es Kopi Susu
          </h3>

          <p>
            Rp 18.000
          </p>

          <button
            onclick="addToCart('Es Kopi Susu',18000)"
          >
            Tambah
          </button>

        </div>

        <!-- MENU 2 -->
        <div class="menu-card">

          <img src="images/kopi-hitam.jpg">

          <h3>
            Kopi Hitam
          </h3>

          <p>
            Rp 12.000
          </p>

          <button
            onclick="addToCart('Kopi Hitam',12000)"
          >
            Tambah
          </button>

        </div>

        <!-- MENU 3 -->
        <div class="menu-card">

          <img src="images/roti-bakar.jpg">

          <h3>
            Roti Bakar
          </h3>

          <p>
            Rp 15.000
          </p>

          <button
            onclick="addToCart('Roti Bakar',15000)"
          >
            Tambah
          </button>

        </div>

      </div>

    </section>

    <!-- CART -->
    <section class="section cart-section">

      <h2>
        🛒 Keranjang
      </h2>

      <div id="cart-items"></div>

      <h3 class="total">

        Total:
        Rp <span id="total">0</span>

      </h3>

      <!-- FORM -->
      <form id="orderForm">

        <input
          type="text"
          id="nama"
          placeholder="Nama customer"
          required
        >

        <input
          type="text"
          id="meja"
          placeholder="Nomor meja"
          required
        >

        <button type="submit">
          Pesan Sekarang
        </button>

      </form>

    </section>

  </main>

  <!-- POPUP -->
  <div id="popup" class="popup">

    <div class="popup-content">

      <h2>
        ☕ Pesanan Berhasil!
      </h2>

      <p>
        Nomor Antrian Kamu
      </p>

      <h1 id="queue-number">
        #1
      </h1>

      <p>
        Silakan menuju kasir untuk pembayaran 😄
      </p>

      <button onclick="closePopup()">
        Oke
      </button>

    </div>

  </div>

</body>
</html>
