<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Warkop Senja</title>

  <link rel="stylesheet" href="style.css">

  <!-- FIREBASE -->
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- SCRIPT -->
  <script defer src="script.js"></script>

  <!-- FONT -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- HERO -->
  <header class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>
        ☕ WARKOP SENJA ☕
      </h1>

      <p>
        Nongkrong, ngopi, cerita sampai lupa waktu.
      </p>

    </div>

  </header>

  <!-- MAIN -->
  <main>

    <!-- MENU -->
    <section class="section">

      <h2>
        Menu Favorit
      </h2>

      <!-- MENU FIREBASE -->
      <div
        class="menu-grid"
        id="menu-container"
      ></div>

    </section>

    <!-- CART -->
    <section class="section cart-section">

      <h2>
        🛒 Keranjang
      </h2>

      <div id="cart-items"></div>

      <h3 class="total">

        Total:
        Rp <span id="total">0</span>

      </h3>

      <!-- FORM -->
      <form id="orderForm">

        <input
          type="text"
          id="nama"
          placeholder="Nama customer"
          required
        >

        <input
          type="text"
          id="meja"
          placeholder="Nomor meja"
          required
        >

        <button type="submit">
          Pesan Sekarang
        </button>

      </form>

    </section>

    <!-- TRACKING -->
    <section class="section tracking-section">

      <h2>
        📦 Cek Status Pesanan
      </h2>

      <form id="trackForm">

        <input
          type="number"
          id="trackInput"
          placeholder="Masukkan nomor antrian"
          required
        >

        <button type="submit">
          Cek Status
        </button>

      </form>

      <div id="tracking-result"></div>

    </section>

  </main>

  <!-- POPUP -->
  <div id="popup" class="popup">

    <div class="popup-content">

      <h2>
        ☕ Pesanan Berhasil!
      </h2>

      <p>
        Nomor Antrian Kamu
      </p>

      <h1 id="queue-number">
        #1
      </h1>

      <p>
        Silakan menuju kasir untuk pembayaran 😄
      </p>

      <button onclick="closePopup()">
        Oke
      </button>

    </div>

  </div>

</body>
</html>
